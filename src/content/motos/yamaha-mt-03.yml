rating: 4.6
descripcion: >-
  La MT-03 lleva años siendo la naked bicilíndrica de referencia para el motociclista colombiano que quiere dar el salto
  desde una moto de 125-200cc sin comprar directamente una MT-07. Su motor de dos cilindros entrega una suavidad de
  marcha que ninguna monocilíndrica de la competencia logra igualar en este rango de precio.

  En 2026 llega con embrague antirrebote y el sistema de conectividad Y-Connect, mejoras que responden a la presión de
  marcas como CFMoto y KTM, que han subido la apuesta tecnológica en este segmento. En carretera con curvas se siente
  equilibrada y predecible, ideal para ganar confianza sin sustos.

  Su rival más directo hoy es la KTM 250 Duke y la CFMoto 450NK, ambas con paquetes electrónicos más agresivos pero sin
  el respaldo de marca y reventa que tiene Yamaha en Colombia. Es la moto ideal para el motociclista que valora la
  fiabilidad mecánica y el valor de reventa por encima de la última tecnología en pantalla, y que busca un motor
  bicilíndrico como primer paso hacia cilindrajes mayores.
