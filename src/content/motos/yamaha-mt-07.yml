rating: 4.7
descripcion: >-
  La MT-07 ocupa un punto dulce dentro de la familia MT de Yamaha: mucho más accesible en precio que la MT-09, pero con
  un motor bicilíndrico CP2 que entrega torque de sobra para cualquier situación de manejo real en Colombia, desde
  adelantar en carretera hasta moverse con autoridad en ciudad.

  Lo que más se destaca al manejarla es lo fácil que resulta dosificar su potencia: el motor entrega torque desde rpm
  bajas de forma muy lineal, sin sustos ni tirones bruscos, lo que la hace tan buena para el motociclista con
  experiencia como para quien recién está subiendo de cilindraje. El peso relativamente bajo para 689cc ayuda en
  maniobras a baja velocidad.

  Compite con la Kawasaki Z650 y, en un segmento de precio inferior, con motos de 400cc como la Kawasaki Z400. Es la
  moto ideal para el motociclista que quiere una naked de cilindraje mediano-grande con motor bicilíndrico serio, sin
  necesitar la potencia extrema (ni el precio) de la MT-09.
