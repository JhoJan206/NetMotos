descripcion: >-
  La Crypton Finn es la respuesta de Yamaha al segmento de motos utilitarias económicas, un terreno dominado
  tradicionalmente por Bajaj y AKT. Con inyección electrónica de fábrica y el respaldo de marca Yamaha, se posiciona
  como una opción confiable para quien necesita transporte básico sin gastar de más.

  Su punto fuerte es clarísimo: el consumo de combustible. Rueda con tranquilidad más de 45 km por litro en uso urbano
  normal, lo que la vuelve una de las motos más baratas de mantener día a día en todo el catálogo colombiano. A cambio,
  no hay lujos: frenos de tambor en ambas ruedas y una potencia justa para moverse en ciudad sin afanes.

  Compite directamente con la Bajaj Boxer CT100 y la AKT NKD 125. Es la moto ideal para el trabajador independiente, el
  domiciliario o el estudiante que necesita movilidad económica y confiable, priorizando el ahorro en gasolina y
  mantenimiento por encima de cualquier otra característica.
