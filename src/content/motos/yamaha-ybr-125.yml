descripcion: >-
  En un mercado donde cada vez hay más opciones chinas e indias, la Yamaha YBR 125 sigue compitiendo porque hay cosas
  que el tiempo no cambia. Su motor de 124 cc con carburador da 10.5 HP, cifra que no impresiona en papel pero que en la
  práctica entrega una confiabilidad que Yamaha ha perfeccionado por años. Pesa 117 kilos, el asiento a 770 mm es de los
  más accesibles, y el tanque de 12 litros combinado con un consumo de 50 km/l te da una autonomía cercana a los 600 km.
  El diseño es sencillo, sin pretensiones, y los acabados son funcionales. El freno trasero de tambor y la falta de ABS
  son sus mayores debilidades frente a rivales más modernas como la TVS Raider. Pero a 4.990.000 COP, la YBR ofrece algo
  que ninguna moto nueva de ese precio puede igualar: el respaldo de la red Yamaha, que está en cada municipio de
  Colombia. Si se te daña, conseguís repuesto el mismo día. Esa tranquilidad vale oro. Para el que necesita una moto
  para trabajar, ir al trabajo o aprender a manejar, sin aspiraciones deportivas ni pretensiones de velocidad, la YBR
  125 es una decisión de la que no te vas a arrepentir.
