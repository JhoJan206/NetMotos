pros:
  - Mismo motor bicilíndrico de la Ninja 400, con manejo más cómodo
  - Posición de manejo erguida, mejor para uso diario en ciudad
  - ABS de serie y frenos de buen desempeño
contras:
  - Precio alto frente a naked monocilíndricas de la competencia
  - Diseño más discreto comparado con la versión carenada Ninja
  - Repuestos y mantenimiento costosos frente a marcas indias
rating: 4.5
descripcion: >-
  La Z400 es básicamente la Ninja 400 sin carenado, pensada para quien quiere el mismo motor bicilíndrico contundente
  pero en una postura más cómoda para el uso diario en ciudad. Es la naked "premium" del segmento de 400cc en Colombia.

  Comparte mecánica con la Ninja, así que el desempeño en aceleración y sonido es prácticamente idéntico, pero la
  posición erguida la hace más amigable para trancones largos y trayectos urbanos frecuentes. En carretera con curvas
  sigue siendo muy divertida gracias a su chasis liviano.

  Compite con la KTM 250 Duke y, en menor medida, con la Yamaha MT-15, aunque ninguna de las dos iguala su motor de dos
  cilindros. Es la moto ideal para el motociclista que quiere el carácter de una deportiva bicilíndrica pero en formato
  naked, priorizando comodidad diaria sobre el carenado deportivo de la Ninja.
