descripcion: >-
  La Discover 125 Sport marca el regreso de un nombre histórico dentro
  del catálogo Bajaj en Colombia, ahora con un enfoque más deportivo que
  las versiones utilitarias del pasado. Busca competir de frente en el
  segmento de 125cc con estilo, algo que antes era terreno casi
  exclusivo de AKT y TVS.

  En el uso diario se comporta como una 125cc bien equilibrada: consumo
  eficiente, freno de disco delantero para frenadas más seguras, y un
  diseño que la separa visualmente de la Boxer y de la Pulsar N125,
  ambas también de Bajaj. Es una moto pensada para el comprador joven
  que quiere algo con más carácter que una utilitaria pura.

  Compite con la AKT CR4 125 y la TVS Raider 125. Es la moto ideal para
  el motociclista que busca una 125cc con imagen deportiva y el respaldo
  de una marca consolidada, sin gastar el presupuesto de una Pulsar NS125.
