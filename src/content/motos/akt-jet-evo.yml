descripcion: >-
  La Jet Evo es la evolución del popular Jet14 de AKT, resultado de la alianza con SYM Taiwán. Llega al mercado
  colombiano en 2026 con un salto enorme en seguridad: ABS de doble canal y control de tracción TCS, algo inédito en
  scooters de este precio en Colombia. El motor de 149.6 cc con inyección electrónica y refrigeración líquida entrega 14
  HP que se sienten con soltura tanto en ciudad como en carretera. El chasis pierde el piso plano del Jet14, pero gana
  en comportamiento dinámico y estabilidad en curvas. La frenada con ABS doble canal es de otro nivel frente a la
  competencia del segmento. Compite con la Yamaha NMAX 155 y la Honda PCX 160, aunque a un precio más bajo que ambas. Es
  el scooter ideal para el comprador que prioriza la seguridad por encima de todo, sin gastar en scooters premium
  japoneses.
