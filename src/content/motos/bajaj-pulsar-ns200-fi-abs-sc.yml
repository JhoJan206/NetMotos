descripcion: >-
  Saltar de una 125 a la Bajaj Pulsar NS200 FI ABS SC es otro cuento. Con 24.13 HP y 199.5 cc, esta naked ya piensa en
  serio tanto en ciudad como en carretera. Viene con inyección electrónica, ABS de doble canal y transmisión de 6
  velocidades, que es lo mínimo que uno pide a este nivel. La tecnología DTS-i de triple bujía se nota en una entrega de
  potencia pareja desde abajo, ideal para el tráfico colombiano donde necesitas respuesta sin estar llevando el motor al
  límite. El precio de 13.199.000 COP la pone en competencia directa con la TVS Apache RTR 200 y la KTM 200 Duke,
  perdiendo frente a esta última en suspensión (la NS200 lleva horquilla convencional, no invertida). Pero gana en
  relación costo-beneficio si lo que buscas es un motor probado y un ecosistema de servicio que Bajaj ha mejorado
  bastante en los últimos años. El peso de 155 kilos se siente estable en recta, y el tanque de 12 litros da para unos
  380 km de ciudad. No es la más premium en acabados, pero cumple en lo importante.
