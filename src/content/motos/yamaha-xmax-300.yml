rating: 4.7
descripcion: >-
  La XMAX 300 es la maxiscooter que le demuestra a Colombia que un scooter
  también puede ser una moto seria para carretera, no solo para mandados
  cortos. Con casi 28 caballos y un chasis pensado para estabilidad a
  velocidad alta, se siente más cercana a una naked de 300cc que a un
  scooter urbano tradicional.

  En ciudad su tamaño se nota, pero se compensa con un espacio de
  almacenamiento enorme bajo el asiento y una posición de manejo muy
  cómoda. En carretera es donde realmente sorprende: mantiene velocidades
  de crucero altas sin esfuerzo y el freno de disco doble con ABS da
  confianza real en frenadas fuertes.

  Compite contra las scooter premium importadas como la Kymco Xtown 300 y,
  en un escalón de precio superior, la BMW C 400 X. Es la moto ideal para
  el motociclista urbano que quiere comodidad de scooter sin sacrificar
  desempeño en carretera, aunque el precio deja claro que no es un scooter
  para todo el mundo.
