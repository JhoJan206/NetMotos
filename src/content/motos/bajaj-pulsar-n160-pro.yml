pros:
  - Suspensión invertida (USD) y ABS de doble canal a un precio más bajo que la NS160
  - Iluminación full LED e instrumentación digital con Bluetooth
  - Embrague antirrebote (slipper), poco común en este rango de precio
contras:
  - Menos "deportiva" en carácter que la NS160 FI ABS
  - Llanta trasera más angosta que la de su hermana NS160
  - Segmento de 160cc saturado de opciones muy similares en precio
rating: 4.4
descripcion: >-
  La N160 Pro es la versión naked "de calle" dentro de la familia de
  160cc de Bajaj, posicionada como una alternativa algo más accesible
  que la NS160 FI ABS pero sin sacrificar equipamiento importante:
  suspensión invertida, ABS de doble canal, iluminación full LED,
  conectividad Bluetooth y embrague antirrebote vienen de serie.

  En el uso diario se comporta como una naked bien equipada para su
  precio: el motor entrega 16 caballos que alcanzan de sobra para ciudad
  y carretera, y el embrague antirrebote facilita las reducciones de
  marcha bruscas sin que la rueda trasera se bloquee. La llanta trasera
  más angosta que la NS160 la hace algo más ágil en tráfico.

  Compite con la TVS Apache RTR 160 y la Yamaha FZ Versión 3.0. Es la
  moto ideal para el motociclista que quiere equipamiento de gama media-
  alta (USD, ABS doble canal, LED) en una naked de 160cc, sin pagar el
  precio de la versión NS más orientada al manejo deportivo.
