rating: 4.5
descripcion: >-
  La 250 R es la moto insignia de AKT en el segmento naked, y con razón: es la que más cilindraje ofrece dentro de un
  catálogo tradicionalmente enfocado en motos económicas de 125 a 200cc. Con casi 21 caballos y ABS delantero de serie,
  le pelea de frente a marcas con más trayectoria en este rango de cilindraje.

  En carretera es donde más se disfruta: la potencia sobra para adelantar con confianza y el ABS delantero da
  tranquilidad extra en frenadas de emergencia sobre pavimento mojado, algo común en las vías colombianas. En ciudad, el
  peso se nota un poco más que en las CR4 de menor cilindraje.

  Compite con la Bajaj Pulsar NS200 FI ABS y la Suzuki Gixxer SF 250. Es la moto ideal para el comprador que quiere el
  mayor cilindraje posible dentro del presupuesto de una marca económica, priorizando potencia sobre el prestigio de
  marca de la competencia asiática establecida.
