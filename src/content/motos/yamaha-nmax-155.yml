descripcion: >-
  La Yamaha NMAX 155 es el scooter más vendido de Colombia por una razón: hace todo bien. El motor de 155 cc con
  inyección electrónica da 15 HP, suficiente para moverse en ciudad sin problemas y incluso coger una vía rápida sin
  sentirse expuesto. La transmisión CVT es suave, el ABS de doble canal es de serie, y el espacio bajo el asiento te
  cabe un casco y más cosas. Pesa 130 kilos y el asiento a 765 mm —bajito— hace que cualquier persona pueda manejarla
  con confianza. El consumo de 45 km/l está bien, aunque el tanque de solo 6.6 litros significa que vas a la bomba cada
  8-10 días si la usas a diario. No está hecha para carretera: las llantas de 13 pulgadas y la suspensión corta no dan
  la estabilidad que necesitás a altas velocidades. Pero en ciudad, entre semáforos y trancones, es difícil encontrar
  algo más práctico. Los 8.690.000 COP se justifican con la calidad de armado Yamaha, la red de servicio y el ABS. Para
  el que vive en ciudad y prioriza comodidad, protección contra la lluvia y facilidad de uso sobre todo lo demás, la
  NMAX es la respuesta correcta.
