descripcion: >-
  La CR4 200 Pro es el tope de gama de la familia CR4, y la única de las tres que da el salto a inyección electrónica,
  dejando atrás el carburador de las versiones 125 y 150. Es la apuesta de AKT por competir de frente en el segmento de
  naked de 200cc, tradicionalmente dominado por Bajaj y TVS.

  Con casi 17 caballos, tiene la potencia suficiente para moverse con autoridad tanto en ciudad como en carretera, y los
  frenos CBS en ambas ruedas dan una capacidad de frenado que compite bien con motos de marcas más establecidas. El peso
  se siente un poco en maniobras lentas, pero en movimiento se comporta de forma estable.

  Compite directamente con la Bajaj Pulsar NS200 y la TVS Apache RTR 200 4V, ofreciendo un precio bastante más bajo que
  ambas. Es la moto ideal para el comprador que quiere el mayor cilindraje posible dentro del presupuesto de una moto
  económica, sin gastar en las marcas asiáticas más establecidas.
