rating: 4.6
descripcion: >-
  La CR4 125 se ha convertido en una de las 125cc más populares de AKT en Colombia, gracias a un diseño más deportivo
  que el de sus hermanas NKD y CHR, y a la inclusión de frenos CBS (sistema de frenado combinado) que reparte la frenada
  entre ambas ruedas, algo que suma bastante en seguridad para este segmento de precio.

  En el uso diario se comporta como cualquier 125cc bien lograda: liviana, ágil en tráfico y con un consumo que la hace
  muy barata de mantener. El diseño con horquilla de aspecto invertido le da un toque más agresivo que las naked
  tradicionales de la competencia, aunque funcionalmente sigue siendo una suspensión convencional para este rango de
  cilindraje.

  Compite con la TVS Raider 125 y la Yamaha YBRZ 125, siendo de las opciones con mejor reputación entre compradores
  según las calificaciones en los concesionarios. Es la moto ideal para el motociclista joven que quiere una 125cc con
  más estilo que la competencia, sin salirse del presupuesto de una moto de entrada.
