descripcion: >-
  La MT-09 es, para muchos motociclistas colombianos con presupuesto
  amplio, la naked que representa el techo del segmento "accesible" antes
  de saltar a las superbikes. El motor tricilíndrico CP3 de 890cc entrega
  una potencia brutal con un sonido que ninguna bicilíndrica logra
  igualar, y viene acompañado de electrónica de nivel superior: modos de
  manejo, control de tracción y quickshifter de serie.

  En carretera con curvas es una experiencia distinta a todo lo demás en
  este análisis: acelera con una contundencia que exige respeto y el
  chasis responde de forma precisa pese al peso considerable. En ciudad,
  aunque se maneja bien gracias a su buena maniobrabilidad, la potencia
  disponible obliga a manejar con la cabeza fría en tráfico pesado.

  Compite en un nicho reducido en Colombia junto a la Kawasaki Z900 y la
  Triumph Street Triple, motos que pocos compradores nacionales pueden
  pagar de contado. Es la moto ideal para el motociclista experimentado
  que ya pasó por varias motos medianas y quiere el salto definitivo a
  una naked de referencia mundial, sin llegar todavía al terreno de las
  superbikes carenadas.
