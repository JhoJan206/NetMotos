descripcion: >-
  La Dynamic RX Fi es el scooter de mayor cilindraje dentro del catálogo automático de AKT, pensado para el comprador
  que quiere más potencia que un scooter de 125cc sin llegar a las scooter premium importadas. Con 150cc e inyección
  electrónica, se mueve con más soltura que la mayoría de scooters económicos del mercado.

  En ciudad se comporta bien: acelera con autoridad para adelantarse en semáforos y mantiene velocidades de crucero
  urbanas sin esfuerzo. El piso plano y el espacio de almacenamiento la hacen práctica para mandados y trabajo diario,
  aunque el freno trasero de tambor es una limitación frente a scooters más equipados.

  Compite con la Yamaha NMAX 155 en un segmento de precio bastante más bajo. Es el scooter ideal para quien quiere más
  cilindraje que el scooter promedio de 125cc, sin gastar en las marcas japonesas premium.
