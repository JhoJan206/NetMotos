descripcion: >-
  La XTZ250 es el escalón intermedio de Yamaha en doble propósito: más cilindraje, más tanque y frenos de disco en ambas
  ruedas frente a la XTZ150, pero sin llegar al precio de una XRE 300 o una Dominar 400. Es la opción para quien quiere
  algo más serio para carretera sin gastar el presupuesto de las adventure medianas.

  El tanque de 16 litros le da una autonomía que se agradece en viajes largos por carretera, y la distancia al piso de
  225 mm permite meterla en trocha sin miedo excesivo a golpear el motor. En carretera pavimentada se siente cómoda para
  trayectos medios, aunque a velocidad sostenida alta el motor pide algo más de fuerza.

  Compite con la Honda XR150L 2.0 y, subiendo de presupuesto, con la Hero Xpulse 200. Es la moto ideal para el
  motociclista que quiere una doble propósito de Yamaha con más autonomía y mejores frenos que la XTZ150, sin necesitar
  todavía la capacidad todoterreno de una XRE 300.
