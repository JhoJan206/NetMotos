pros:
  - La única deportiva carenada de 200cc con motor derivado de KTM en su rango de precio
  - ABS de doble canal de serie, poco común en deportivas de este cilindraje
  - Frenos de disco grandes (300 mm delantero) para su categoría
contras:
  - Posición de manejo agachada, poco práctica para uso urbano diario
  - Peso considerable (165 kg) frente a otras deportivas de 200cc
  - Carenado completo que encarece reparaciones en caso de caída
rating: 4.5
descripcion: >-
  La RS200 FI ABS lleva años siendo la única deportiva completamente
  carenada de 200cc con motor de raíces KTM disponible en Colombia,
  heredando parte de la ingeniería del proyecto conjunto Bajaj-KTM. Es
  la moto para quien quiere sentirse en una superbike sin gastar el
  presupuesto de una 400cc o más.

  El motor entrega su mejor desempeño a revoluciones altas, con casi 25
  caballos que se sienten con ganas en carretera con curvas. El carenado
  completo mejora la aerodinámica en autopista, aunque en ciudad la
  posición agachada y el calor del motor cerca de las piernas la hacen
  menos cómoda que una naked equivalente.

  Compite con la KTM 200 Duke (en versión naked) y con la Yamaha R15 en
  formato carenado. Es la moto ideal para el motociclista que quiere la
  experiencia visual y de manejo de una deportiva completa, sin
  necesitar todavía el presupuesto de una 300 o 400cc carenada.
