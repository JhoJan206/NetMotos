descripcion: >-
  La CHR 125 es una de las opciones más económicas dentro del catálogo de AKT en Colombia, pensada para el comprador que
  necesita una moto urbana sencilla, sin mayores pretensiones, a un precio de entrada bajo. Es la típica "primera moto"
  para quien recién saca su licencia.

  En el día a día se comporta como se espera de una 125cc básica: se mueve con soltura en tráfico, consume poco y no
  exige mayor mantenimiento más allá de lo rutinario. El freno de disco delantero es un plus frente a otras motos de
  este rango de precio que todavía vienen con tambor en ambas ruedas.

  Compite con la Bajaj Boxer CT100 y la AKT NKD 125. Es la moto ideal para el comprador con presupuesto ajustado que
  busca transporte básico y confiable para moverse en ciudad, sin necesitar potencia ni equipamiento adicional.
