descripcion: >-
  Si estás buscando una moto para el día a día en ciudad sin gastar un platal, la AKT NKD 125 es de esas opciones que
  uno mira dos veces. Sus 10.5 HP y 120 kilos la hacen ágil entre el tráfico, y con 50 km/l no vas a vivir pendiente del
  tanque. El asiento a 775 mm la vuelve muy amigable para pilotos de cualquier estatura, ideal para quien está empezando
  o necesita un vehículo de trabajo liviano. Donde más destaca es en la disponibilidad de repuestos —al ser AKT,
  consigues todo en cualquier pueblo— y el mantenimiento no duele. Claro, no esperes lujos: carburador, freno trasero de
  tambor y una potencia que en carretera se queda corta por encima de los 80 km/h. Pero para el trancón de Bogotá,
  Medallo o Cali, cumple y sobra. Un detalle: el tanque de 11 litros te da una autonomía brutal, ideal para los que
  hacen domicilios o recorren la ciudad todo el día.
