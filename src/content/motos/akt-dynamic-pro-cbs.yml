descripcion: >-
  La Dynamic Pro CBS es el scooter de entrada de AKT, pensado para competir directamente en el segmento más económico de
  scooters de 125cc. Su gran diferencial frente a otras opciones de este precio es el sistema de frenado combinado CBS,
  que reparte la frenada entre ambas ruedas para mayor seguridad.

  En el uso diario es un scooter sencillo y correcto: liviano, fácil de maniobrar entre el tráfico y con un consumo de
  combustible que lo hace muy económico de mantener. No tiene las prestaciones de un scooter más grande, pero cumple
  perfectamente para trayectos cortos dentro de la ciudad.

  Compite con la Honda Nav-i y la AKT Jet Evo, esta última de la misma marca. Es el scooter ideal para el comprador con
  presupuesto ajustado que busca movilidad urbana básica con un plus de seguridad en los frenos, sin necesitar mayor
  cilindraje ni equipamiento.
