descripcion: >-
  Hay motos que envejecen bien, y la Suzuki GN 125 es el ejemplo perfecto. Salió hace décadas y sigue vigente porque
  hace lo básico sin complicaciones. Su carburador Mikuni y motor de 124 cc entregan 11.2 HP con una suavidad que solo
  Suzuki sabe darle a un monocilíndrico. Pesa 115 kilos y el asiento a 760 mm —el más bajo de la lista— la hace ideal
  para quienes buscan seguridad al maniobrar. El tanque es pequeño (9.5 litros) y la tecnología es básica, pero la
  confiabilidad es legendaria. En el mercado colombiano, la GN 125 tiene un estatus casi de culto: se revende fácil, los
  repuestos originales aguantan años y cualquier taller la conoce. A 5.390.000 COP no es la más barata del segmento,
  pero la depreciación es mínima. Para el que quiere una naked simple, bien hecha y que no va a dejar botado, la GN 125
  sigue siendo una de las mejores decisiones que puede tomar. La desventaja: si buscas tecnología, ABS o diseño moderno,
  esta no es tu moto.
