descripcion: >-
  La Hero Hunk 160R llega a un segmento caliente —el de las naked de 160 cc— con argumentos sólidos. Su motor de 163
  cc con inyección electrónica genera 15.2 HP y 14 Nm de torque, números que la ponen por encima de la FZ 3.0 y cerca de
  la Apache RTR 160. Pesa solo 129 kilos, lo que se traduce en una relación peso-potencia muy divertida para ciudad.
  Trae ABS en el freno delantero, disco atrás y horquilla de 37 mm que aguanta el ritmo. El diseño es moderno, con ese
  tanque anguloso que le da carácter. El problema histórico de Hero es la red de servicio: si bien ha crecido, todavía
  no tiene la capilaridad de Honda o Yamaha. Los 5.490.000 COP la hacen tentadora frente a una CB125F que vale casi lo
  mismo con menos potencia. Para el motero que ya tuvo una 125 y quiere dar el paso sin llegar a los 200 cc, la Hunk
  160R es de las opciones más divertidas del mercado colombiano. El consumo de 44 km/l no es el mejor del segmento pero
  tampoco duele.
