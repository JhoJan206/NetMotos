descripcion: >-
  Si hay una naked que sabe a qué juega en las 200 cc, es la KTM 200 Duke. Con 24.7 HP y apenas 140 kilos, la relación
  peso-potencia es la mejor del segmento, y eso se siente cada vez que abrís el acelerador. La horquilla invertida WP
  APEX de 45 mm y el monoshock WP atrás son componentes que no ves en ninguna rival al mismo precio —de hecho, son los
  mismos que usa la 390 Duke. El ABS de doble canal con pinza radial ByBre y disco de 320 mm adelante te para en seco.
  Todo esto cuesta 18.990.000 COP, que es lo que duele: bastante más que la Pulsar NS200 o la Apache RTR 200. Pero la
  diferencia en calidad de componentes es abismal. La altura del asiento (815 mm) puede ser un problema si eres bajito.
  La 200 Duke pide gasolina extra, que en Colombia sale más cara, y el consumo de 30 km/l no ayuda. Pero para el que
  busca la experiencia de manejo más cercana a una moto grande sin saltar a los 400 cc, la Duke 200 es imbatible. La
  garantía de 4 años sin límite de kilometraje desde 2026 es un plus que quita varios miedos.
