rating: 4.4
descripcion: >-
  La Versys-X 300 combina el ADN de la familia Versys de Kawasaki con un
  motor bicilíndrico de 300cc, algo que la separa claramente de la
  competencia monocilíndrica en este segmento. Es una adventure más
  orientada al touring mixto que al enduro pesado.

  El motor entrega su mejor desempeño a revoluciones altas, así que en
  ciudad exige moverse un poco más de marchas de lo habitual, pero en
  carretera abierta es donde se siente su verdadera vocación: estable,
  con buena protección al viento y tanque grande para rodar largo sin
  preocuparse por la gasolina.

  Compite con la Honda XRE 300 y la Suzuki V-Strom 250, diferenciándose
  por su motor de dos cilindros y su enfoque más de carretera que de
  trocha extrema. Es la moto ideal para el motociclista que quiere hacer
  viajes largos con comodidad de adventure, sin necesitar la capacidad
  todoterreno de una enduro dedicada.
