descripcion: >-
  La XRE 300 Sahara es la respuesta de Honda para quien realmente piensa
  meter la moto a terrenos difíciles y no solo verse aventurero en la
  ciudad. Con casi 26 cm de distancia al piso y una suspensión de largo
  recorrido, pasa huecos, piedras y barro que dejarían varada a cualquier
  naked convencional.

  En carretera cumple bien, aunque no es la más veloz de su categoría; su
  fuerte es el uso mixto donde el asfalto se acaba. La posición de manejo
  erguida ayuda en trocha, pero en trayectos largos de autopista se siente
  algo cansona por la altura del asiento y el viento directo sin
  carenado.

  Su competencia directa es la Bajaj Dominar 400 y la Kawasaki Versys-X
  300, aunque ninguna la iguala en capacidad todoterreno pura. Es la moto
  ideal para el que viaja a fincas, hace turismo de aventura o simplemente
  quiere una doble propósito que no le tenga miedo a salirse del pavimento,
  y que además está dispuesto a pagar el premium que cobra la marca del
  ala dorada.
