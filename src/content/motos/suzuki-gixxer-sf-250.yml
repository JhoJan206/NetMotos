descripcion: >-
  La Suzuki Gixxer SF 250 es la deportiva de acceso más seria que puedes comprar en Colombia sin saltar a los 300 cc o
  más. Su motor refrigerado por aceite —una solución intermedia entre aire y líquido— entrega 26.1 HP y 22 Nm, con ABS
  de doble canal de serie. El carenado completo le da una imagen de moto grande, aunque también suma peso: 161 kilos que
  se sienten al maniobrar en bajas. En carretera, sin embargo, la postura semifija y la transmisión de 6 velocidades la
  hacen viajar cómoda a 120 km/h, algo que las naked del mismo cilindraje no logran sin sufrir. El precio de 17.130.000
  COP es alto, y ahí compite con la KTM 200 Duke por menos plata. Pero la Gixxer SF 250 ofrece un enfoque distinto: más
  protección aerodinámica, ABS completo y ese motor SACS que casi no pide mantenimiento. Es para el que quiere estética
  de deportiva sin lidiar con los costos de una 400. La llanta trasera 150/60-17 le da buena pinta desde atrás, y en
  carretera se siente sólida.
