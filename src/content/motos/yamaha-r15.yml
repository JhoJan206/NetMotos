descripcion: >-
  La R15 es la moto que muchos jóvenes colombianos sueñan tener antes de
  dar el salto a cilindrajes mayores. Hereda la tecnología de la familia R
  de Yamaha en un paquete de 155cc, con suspensión invertida, ABS y un
  chasis que responde con una precisión que pocas rivales de su rango de
  precio logran igualar.

  En ciudad el motor se siente algo apretado a bajas revoluciones, pero
  cuando sube de vueltas revela por qué tiene tanta fama entre los que
  buscan sensaciones deportivas reales sin gastar en una 300cc. La
  posición de manejo agachada es divertida en curvas, aunque cansa en
  trancones largos.

  Su rival directo es la Suzuki Gixxer SF 250 y, en menor medida, la TVS
  Apache RTR 200 4V. Es la moto ideal para el motociclista joven que quiere
  la experiencia más cercana posible a una superbike sin gastar el
  presupuesto de una moto de 300cc o más, priorizando manejo deportivo
  sobre comodidad.
