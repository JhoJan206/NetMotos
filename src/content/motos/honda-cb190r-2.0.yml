descripcion: >-
  La Honda CB190R 2.0 ocupa un espacio interesante: no es una 150 cualquiera pero tampoco llega a ser una 200. Sus 184.4
  cc con inyección PGM-FI dan 17 HP y 15.5 Nm, suficiente para moverse con soltura en ciudad y carretera sin pagar el
  salto a los 200 cc. Pesa 142 kilos y tiene el asiento más bajo de las naked de su categoría (770 mm), ideal para
  pilotos de baja estatura. La suspensión delantera invertida le da un toque deportivo que se nota en las curvas, y el
  ABS delantero de serie es un plus de seguridad que varias rivales en su precio no ofrecen. El precio de 12.790.000 COP
  está en el rango de la GSX-S150 y la FZ 3.0, y compite ofreciendo la red de servicio más grande de Colombia. El motor
  enfriado por aire es de bajo mantenimiento pero se calienta más en tráfico pesado. El consumo de 35 km/l es normal
  para su cilindraje pero más alto que una FZ 3.0. Es para el que quiere una naked con presencia, respaldo de marca y un
  motor que responde bien en el rango medio sin tener que ir a revoluciones altas todo el tiempo.
