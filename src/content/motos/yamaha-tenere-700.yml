descripcion: >-
  La Ténéré 700 es la adventure con la que Yamaha le habla directamente
  al motociclista colombiano que sueña con hacer travesías largas fuera
  del asfalto, tipo Ruta 40 o cruces por trocha en los Andes. Su chasis
  angosto y su suspensión de largo recorrido están pensados desde el
  diseño para pilotar de pie en terreno difícil, no solo para verse
  aventurera parqueada.

  El motor bicilíndrico CP2, el mismo espíritu que el de la MT-07,
  entrega torque de forma lineal y predecible, ideal para dosificar
  potencia en subidas técnicas o terreno resbaloso. La distancia al piso
  de 240 mm y el recorrido de suspensión de más de 200 mm le permiten
  pasar obstáculos que dejarían varada a cualquier doble propósito
  convencional.

  Compite con la Honda CB500X y, en un segmento de precio similar, con
  la KTM 390 Adventure. Es la moto ideal para el motociclista
  experimentado que realmente piensa usar la capacidad todoterreno de la
  moto, no solo para quien busca la estética adventure sin salirse
  nunca del pavimento.
