descripcion: >-
  La Bajaj Pulsar NS125 es de esas motos que mirás y pensás "esto parece más caro de lo que es". El diseño de tanque
  musculoso y el monoamortiguador Nitrox le dan una presencia que no esperás en una 125 de 4.390.000 COP. El motor rinde
  12 HP, que es de lo más alto en el segmento, y el chasis le da buen comportamiento en curvas para ser una naked
  económica. El tanque de 11 litros va bien para el día a día. Donde se nota el ajuste de precio es en los componentes:
  freno trasero de tambor, carburador en vez de inyección, y el servicio técnico de Bajaj no está tan extendido como el
  de AKT o Yamaha. Para el motero joven que quiere una moto con estilo deportivo sin gastar lo que cuesta una Honda, la
  NS125 es de las más atractivas visualmente. Pero hay que tener claro que es una moto para ciudad, no para carretera.
  Los 122 kilos la hacen ágil, y el asiento a 785 mm es cómodo para la estatura promedio colombiana. El consumo de 48
  km/l está bien dentro del promedio.
