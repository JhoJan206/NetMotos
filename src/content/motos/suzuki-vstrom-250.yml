descripcion: >-
  La V-Strom 250 SX le da a Colombia algo poco frecuente en el segmento de
  250cc: un motor de dos cilindros, que entrega una suavidad de marcha muy
  distinta a la vibración típica de los monocilíndricos de esta gama. Es
  una moto pensada para carretera larga con toques de trocha liviana, no
  para enduro pesado.

  El tanque grande es su mejor argumento para viajar: con 17.3 litros la
  autonomía supera con facilidad los 400 km, algo valioso en las rutas
  colombianas donde las estaciones de servicio no siempre están cerca. El
  peso se siente en trocha destapada, pero en asfalto se mueve con
  estabilidad y buen freno.

  Compite de frente con la Bajaj Dominar 400 y la Kawasaki Versys-X 300,
  peleando terreno gracias a su motor bicilíndrico como diferenciador. Es
  la moto ideal para quien prioriza comodidad de marcha en carretera sobre
  capacidad todoterreno pura, y que valora tener un motor más refinado
  aunque cueste un poco más que la competencia monocilíndrica.
