descripcion: >-
  La Yamaha MT-15 es la naked más picante del segmento de 155 cc, y no solo por su diseño de moto zombie que tanto
  gusta. El motor de 155 cc con VVA (distribución variable) entrega 18.6 HP a 10.000 rpm, una cifra que deja atrás a
  cualquier otra naked de cilindraje similar. Viene con horquilla invertida de 37 mm, ABS de doble canal, transmisión de
  6 velocidades y llanta trasera de 140/70-17. Pesa 138 kilos y se siente aún más ligera en movimiento. El problema es
  que todo esto cuesta 9.890.000 COP, que para 155 cc es un precio fuerte —casi el doble de una 125 básica. Además, la
  postura es deportiva, inclinada hacia adelante, que no es la más cómoda para el tráfico diario en ciudad. El consumo
  de 40 km/l está bien para la potencia que da, pero no es económico para el cilindraje. Está hecha para el que valora
  el rendimiento deportivo por encima de la practicidad. Si querés una naked que acelere de verdad, con componentes de
  gama alta y un chasis que invita a inclinarse en cada curva, la MT-15 es tu moto. Pero no esperes que sea práctica ni
  barata de mantener.
