descripcion: >-
  La XTZ150 es la doble propósito de entrada de Yamaha, pensada para el
  comprador que necesita una moto liviana capaz de moverse tanto en
  ciudad como en caminos destapados, sin pagar el precio de una XTZ250 o
  una XRE 300. Es una moto muy popular en zonas rurales y fincas por su
  bajo costo de mantenimiento.

  Su peso liviano de apenas 128 kg la hace muy fácil de manejar en trocha
  y de levantar si se cae, algo valioso para el usuario que recién
  empieza a rodar fuera del asfalto. El consumo de combustible es de los
  mejores de su categoría, rindiendo bien tanto en ciudad como en
  carretera destapada.

  Compite con la AKT TTR 125 y, en un segmento algo superior, con la
  Suzuki GN 125 en su versión adaptada. Es la moto ideal para el
  comprador rural o el motociclista urbano que necesita una doble
  propósito básica, económica y liviana, sin pretensiones de velocidad
  ni de equipamiento avanzado.
