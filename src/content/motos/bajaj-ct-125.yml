descripcion: >-
  Por 3.990.000 COP la Bajaj CT 125 se convierte en la entrada más barata del segmento, y eso solo ya la pone en el
  radar de cualquiera que necesite una moto nueva sin endeudarse hasta el cuello. Trae un motor de 124.6 cc con 10.8 HP
  y un consumo que roza los 55 km/l, combinado con un tanque de 12 litros que te da semanas sin ver una bomba. Es
  liviana —118 kilos— y el asiento a 785 mm queda bien para la mayoría. Lo que más se siente es que es una moto pensada
  en función del precio: acabados funcionales pero sin muchos detalles, carburador en vez de inyección, y el respaldo de
  marca apenas está creciendo en Colombia. Si vives en una ciudad grande, probablemente consigas servicio técnico sin
  problema; en pueblos pequeños la cosa se complica. Aun así, para el que busca lo más económico del mercado y no le
  interesa presumir, es un negocio redondo.
