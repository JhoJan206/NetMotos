descripcion: >-
  La Boxer 150X es la respuesta de Bajaj para quien necesita una moto de
  trabajo que aguante terreno difícil sin sacrificar la economía que ha
  hecho famosa a la línea Boxer en Colombia. Sube el cilindraje frente a
  la CT100, pero mantiene la filosofía de bajo consumo y bajo costo de
  mantenimiento.

  Su suspensión SNS y las llantas pensadas para que el barro no se pegue
  la hacen una opción sólida para quien trabaja en zonas rurales o
  reparte mercancía por caminos destapados. El indicador de marchas y el
  medidor de combustible son detalles que se agradecen en una moto de
  este segmento, donde muchas veces ni siquiera vienen de fábrica.

  Compite con la Suzuki GN 125 y con motos utilitarias de marcas chinas
  de menor respaldo. Es la moto ideal para el trabajador que necesita
  resistencia y bajo consumo por encima de cualquier lujo, ya sea para
  mensajería rural, agricultura o transporte de trabajo diario en
  terreno exigente.
