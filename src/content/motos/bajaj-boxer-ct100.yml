descripcion: >-
  La Boxer CT100 es la moto que uno ve trabajando desde que sale el sol hasta que se esconde: domicilios, mensajería,
  vendedores ambulantes y hasta taxis informales en pueblos pequeños. No es rápida ni bonita en el sentido moderno, pero
  cumple exactamente lo que promete: rodar todos los días sin dar problemas y sin comerse la plata en gasolina.

  En ciudad rinde tranquilamente más de 40 km por litro manejando con cabeza, y en carretera destapada se defiende
  gracias a su chasis liviano y su buena distancia al piso. El motor de 100cc no es potente, así que adelantar en vía
  con tráfico pesado o subir con parrillero exige paciencia, pero para trayectos urbanos cortos sobra.

  La relación precio-calidad es su mayor argumento: compite directamente con la AKT NKD 125 y la Suzuki GN 125, siendo
  más económica que ambas al arranque pero con menos cilindraje. Es la moto ideal para quien necesita transporte básico,
  confiable y barato de mantener, no para quien busca comodidad o prestaciones.
