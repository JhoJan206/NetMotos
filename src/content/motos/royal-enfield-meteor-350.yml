rating: 4.4
descripcion: >-
  La Meteor 350 es la puerta de entrada al mundo Royal Enfield para el
  motociclista colombiano que busca algo distinto a las naked deportivas
  del mercado. Con su estilo crucero relajado y ese sonido de escape
  grave tan característico de la marca, se siente como ninguna otra moto
  en su rango de precio.

  Su fuerte es la comodidad: la posición de manejo erguida y los pies
  adelantados hacen que trayectos largos en carretera se sientan
  relajados, muy distinto a la postura deportiva de una naked
  convencional. El torque disponible desde rpm bajas facilita adelantar
  sin tener que exprimir el motor.

  Compite con la Hunter 350 de la misma marca (más orientada a ciudad) y,
  en un segmento distinto, con las cruceras chinas de bajo costo. Es la
  moto ideal para el motociclista que valora el carácter y la estética
  clásica sobre la potencia pura, y que quiere una moto para rodar
  tranquilo los fines de semana con estilo propio.
