  - Precio elevado frente a rivales japonesas del mismo cilindraje
  - Red de concesionarios BMW Motorrad limitada en Colombia
rating: 4.5
descripcion: >-
  La G 310 R es la puerta de entrada al mundo BMW Motorrad en Colombia, y
  se nota que la marca no quiso hacer una moto "de entrada" cualquiera. El
  motor con la culata orientada hacia atrás es un detalle técnico poco
  común en este segmento, pensado para mejorar el equilibrio y la
  respuesta del chasis.

  En curvas es donde más se disfruta: el centro de gravedad bajo y el
  chasis bien calibrado le dan una sensación de manejo que se acerca más
  a una moto europea de mayor cilindraje que a una naked asiática típica
  de 300cc. En ciudad también se comporta con soltura, aunque el tanque
  pequeño obliga a tanquear más seguido de lo ideal para salidas largas.

  Compite con la KTM 250 Duke y la Kawasaki Z400, diferenciándose por el
  prestigio de marca y la calidad de construcción típica alemana. Es la
  moto ideal para el motociclista que quiere entrar al segmento premium
  europeo sin comprar una moto de gran cilindraje, priorizando manejo
  refinado y estatus de marca sobre el precio de compra.
