rating: 4.7
descripcion: >-
  La RC 390 es, para muchos, la deportiva "de entrada" más seria que se puede comprar nueva en Colombia sin llegar a una
  superbike. Con 44 caballos y un chasis derivado del ADN de competencia de KTM, entrega una experiencia de manejo que
  se acerca bastante a la de motos de cilindraje mayor.

  En pista o en carreteras con curvas es una fiera: acelera con ganas, frena con precisión gracias a sus discos
  radiales, y el ABS en curva da seguridad al llevarla al límite. En ciudad, en cambio, la posición agachada y la
  rigidez de la suspensión la vuelven menos cómoda para el uso diario que una naked equivalente.

  Compite directamente con la Kawasaki Ninja 400, siendo la RC 390 la opción más orientada a manejo de pista puro. Es la
  moto ideal para el motociclista que ya tiene experiencia y busca la deportiva más contundente posible en el segmento
  de 390-400cc, priorizando desempeño sobre comodidad de uso diario.
