descripcion: >-
  La Nx500 es el escalón que muchos motociclistas sueñan alcanzar después
  de años en cilindrajes medianos: una adventure bicilíndrica, seria,
  hecha por Honda, con la solidez mecánica que caracteriza a la marca. No
  es la más potente de su segmento, pero es probablemente la más
  equilibrada.

  El motor de 471cc entrega una potencia lineal y fácil de dosificar, algo
  que se agradece tanto en trocha destapada como en carretera a
  velocidades altas. El tanque grande le da una autonomía que pocas
  rivales igualan, ideal para viajes largos sin depender de estaciones de
  servicio cada rato.

  Su competencia natural son la Kawasaki Versys 650 y algunas Royal
  Enfield de mayor cilindraje, aunque compite en un nicho más reducido en
  Colombia por su precio. Es una moto pensada para el motociclista
  experimentado que ya tuvo varias motos antes y busca dar el salto a
  algo más grande, confiable y con verdadera vocación de viaje.
