descripcion: >-
  La Pulsar NS400Z redefinió lo que se podía esperar de una moto de 400cc
  en Colombia al llegar con casi 40 caballos de potencia por un precio
  muy por debajo de los 20 millones de pesos, en un segmento donde
  rivales con potencia similar suelen costar entre 30 y 34 millones. Es,
  sin exagerar, una de las mejores relaciones precio-potencia del
  mercado nacional.

  El paquete tecnológico también sorprende para su precio: cuatro modos
  de manejo que ajustan la respuesta del motor y el ABS según el
  terreno, control de tracción y una consola con conectividad Bluetooth
  completa. En carretera, la potencia se siente contundente y el chasis
  responde bien pese al peso considerable de la moto.

  Compite directamente con la KTM 390 Duke y la TVS Apache RTR 310,
  ofreciendo cifras de potencia comparables (e incluso superiores) a un
  precio bastante más bajo. Es la moto ideal para el motociclista que
  quiere el salto a 400cc sin gastar el presupuesto de las marcas
  austríacas o europeas, priorizando potencia y tecnología sobre el
  prestigio de marca.
