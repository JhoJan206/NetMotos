descripcion: >-
  Si creés que todas las 125 son iguales, la TVS Raider 125 te va a hacer cambiar de opinión. Con 11.5 HP, inyección
  electrónica y doble freno de disco, es técnicamente superior a la mayoría de sus rivales del mismo cilindraje. El
  motor de 124.8 cc con monoamortiguador ajustable le da un comportamiento dinámico que no esperás en este rango de
  precio. Pesa 122 kilos y el asiento a 780 mm es universal. El diseño es moderno, con líneas deportivas que la hacen
  ver más cara de lo que es. El consumo de 52 km/l es excelente para una moto con inyección, y el arranque en frío no te
  da dolor de cabeza como las carburadas. El precio de 4.890.000 COP está por encima del promedio de las 125, pero lo
  que pagas de más lo recibís en tecnología y frenado. La limitante es, como siempre con TVS, la red de servicio y la
  disponibilidad de repuestos fuera de las grandes ciudades. Para el joven que quiere una 125 que no se sienta como una
  moto de trabajo, con buen rendimiento y frenos que responden de verdad, la Raider es de lo mejor que hay en el mercado
  colombiano.
