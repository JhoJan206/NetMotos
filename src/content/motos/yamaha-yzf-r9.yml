descripcion: >-
  La YZF-R9 llega a Colombia en 2026 como la deportiva carenada más
  ambiciosa de Yamaha para el mercado nacional, llenando el vacío que
  dejó la salida de la R6 y la R1 del catálogo homologado para calle. Usa
  el mismo motor tricilíndrico CP3 de 890cc de la MT-09, pero con
  suspensión, frenos y electrónica llevados a un nivel mucho más cercano
  a la pista.

  Su comportamiento en curvas es de otro nivel frente al resto del
  catálogo Yamaha en Colombia: la suspensión KYB totalmente ajustable
  permite afinar la moto para pista o carretera, y los frenos radiales
  con ABS dan una capacidad de frenado que pocas motos vendidas
  legalmente en el país logran igualar. En ciudad, como es de esperarse
  en una supersport, la posición agachada la hace poco práctica para el
  uso diario.

  Compite en el segmento premium con la Ducati Panigale V2 y la Aprilia
  RS 660, aunque con un precio más competitivo dentro de ese grupo. Es la
  moto ideal para el motociclista experimentado, con presupuesto alto,
  que quiere la experiencia más cercana a una moto de competición sin
  salirse del catálogo homologado para calle en Colombia.
