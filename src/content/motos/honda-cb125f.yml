descripcion: >-
  ¿Por qué la gente sigue comprando la Honda CB125F? Porque es una Honda, y en Colombia eso pesa. El motor de 124 cc con
  inyección PGM-FI da 10.8 HP pero lo importante es que arranca siempre, frío o caliente, sin pensar. Pesa 116 kilos,
  tiene el asiento más bajo del segmento (771 mm) y un consumo de 52 km/l que la vuelve ultraeconómica. La inyección
  electrónica marca la diferencia frente a las rivales carburadas: mejor arranque, menor contaminación y ese andar suave
  que Honda sabe darle. El diseño es conservador, sin aspavientos, y el freno trasero de tambor delata que es una moto
  de presupuesto. Pero la red de servicio Honda está en cada esquina del país, y los repuestos se consiguen hasta en la
  tienda de la esquina. Esa tranquilidad vale los 5.190.000 COP. No es la moto más emocionante del catálogo, pero es
  probablemente la decisión más sensata para el que necesita transporte confiable y sin dolores de cabeza. Si priorizas
  la paz mental sobre las prestaciones, esta es tu moto.
