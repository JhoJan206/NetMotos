descripcion: >-
  Con un planteamiento de sport urbana, la Hero Hunk 125R intenta darle una cara más agresiva al segmento de 125 cc. Su
  motor entrega 11 HP a 7.500 rpm y lo mejor que trae son los frenos: disco adelante de 276 mm y disco atrás de 220 mm,
  algo que no todo el mundo ofrece en este cilindraje. El monoamortiguador Nitrox atrás ayuda a que se sienta más
  plantada en las curvas que las rivales con doble amortiguador. Pesa 124 kilos y el asiento a 790 mm es accesible. El
  problema de Hero en Colombia sigue siendo la red: apenas está creciendo y en ciudades intermedias conseguir un
  repuesto puede ser una odisea. Los 4.590.000 COP están bien por lo que ofrece en papel, pero hay que medir bien si en
  tu zona hay concesionario. La garantía de 2 años da tranquilidad, pero la disponibilidad de servicio es el verdadero
  filtro. Para el que vive cerca de un taller Hero y quiere algo distinto a las AKT y Bajaj de siempre, es una opción
  válida.
