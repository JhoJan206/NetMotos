descripcion: >-
  La Nav-i es la apuesta de Honda por el scooter más económico y básico de su portafolio, pensado para trayectos cortos
  dentro de la ciudad y para quien busca su primer vehículo motorizado sin complicarse con marchas. Su tamaño reducido
  la hace ideal para colarse entre el tráfico bogotano o paisa sin sufrir.

  El consumo es su gran fortaleza: fácilmente supera los 50 km por litro en uso urbano moderado, lo que la vuelve muy
  barata de mantener día a día. A cambio, el tanque de menos de 4 litros obliga a visitar la bomba de gasolina seguido,
  algo que en carretera resulta poco práctico.

  Compite con la Yamaha Ray ZR y la AKT Genesis, y aunque no es la scooter con más equipamiento del mercado, gana por
  confiabilidad y respaldo de marca. Es la opción recomendada para estudiantes o para quien necesita movilidad urbana
  económica sin pretensiones de viajar lejos.
