descripcion: >-
  La TVS Apache RTR 160 4V es una de esas motos que sorprenden a quien no conoce la marca. Con 16 HP y 14.8 Nm, su motor
  de 159.7 cc con inyección electrónica es de los más potentes del segmento, y el chasis de doble viga le da un
  comportamiento deportivo que se agradece en carreteras de montaña. Trae doble freno de disco —algo que no todas las
  160 ofrecen— y un monoamortiguador ajustable atrás. Pesa 136 kilos, bien equilibrados. El precio de 5.690.000 COP está
  muy bien para lo que ofrece. El problema es el mismo de siempre con TVS: la red de servicio. En ciudades principales
  como Bogotá, Medellín o Cali hay concesionarios, pero en pueblos pequeños la cobertura es prácticamente nula. Y los
  repuestos, aunque están mejorando, no tienen la disponibilidad de Honda o Yamaha. Para el motero urbano que quiere
  algo con carácter deportivo, que rinda bien en ciudad y que no sea lo mismo que todos tienen, la Apache RTR 160 es una
  apuesta que vale la pena. Solo asegúrate de tener un taller TVS cerca.
