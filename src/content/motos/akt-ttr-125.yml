descripcion: >-
  La TTR 125 de AKT se renueva para 2026 con frenos CBS y un diseño más robusto, manteniendo su enfoque de doble
  propósito para el campo colombiano. Sus 124.9 cc con carburador entregan 10.3 HP que van bien tanto en carretera
  destapada como en recorridos urbanos. La distancia al suelo de 255 mm y las llantas 90/90-19 adelante y 110/90-17
  atrás la hacen competente en terrenos irregulares. El asiento a 820 mm sigue siendo alto para pilotos de baja
  estatura, pero la postura erguida y el manillar ancho son cómodos para manejo fuera de pavimento. En ciudad no es la
  más práctica por su altura y suspensión blanda, pero cumple. Lo mejor: el CBS suma seguridad al frenar y los repuestos
  AKT se consiguen en cualquier pueblo de Colombia. Lo justo: sigue con carburador y tambor trasero. Compite con la
  Honda XR150L y la Hero Xpulse 200, pero a un precio más bajo.
