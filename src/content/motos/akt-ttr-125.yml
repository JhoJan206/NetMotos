descripcion: >-
  Para el campo colombiano, la AKT TTR 125 es una de esas herramientas que sabes que van a responder. Con un enfoque
  claro de doble propósito, sus 9.5 HP y 115 kilos van bien tanto en carretera destapada como entre pueblo y pueblo. La
  distancia al suelo de 200 mm y las llantas mixtas 2.75-21 adelante y 3.50-18 atrás son su mejor carta de presentación
  para terrenos irregulares. El asiento está a 820 mm, así que si mides menos de 1.70 vas a sentirla un poco alta al
  principio, pero te acostumbras. En ciudad no es la más práctica: el manillar ancho y la postura erguida están pensados
  para otra cosa. Y en carretera pavimentada los 9.5 HP se quedan justos para adelantar. Lo bueno: la red de AKT está
  por todo Colombia y los repuestos son económicos. Lo malo: sin ABS, freno trasero de tambor y un tanque de solo 7.5
  litros que te obliga a planear las paradas si te vas lejos. Es una moto de nicho, pero en su nicho no tiene
  competencia seria a este precio.
