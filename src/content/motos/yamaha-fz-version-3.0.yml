descripcion: >-
  La Yamaha FZ Versión 3.0 FI es la evolución de un nombre que lleva 15 años en Colombia. Con el motor Blue Core de 149
  cc y 13 HP, no es la más potente de su segmento, pero su entrega de torque plana y el consumo de 44 km/l la hacen una
  de las más eficientes. Pesa 137 kilos y el asiento a 790 mm es cómodo, con una postura erguida que funciona bien en
  ciudad. El tanque de 13 litros es el más grande de su categoría, dándote una autonomía que pasa holgadamente los 500
  km. Trae inyección electrónica, freno de disco con ABS monocanal (solo adelante) y llanta trasera de 140/60-17. El
  precio de 11.700.000 COP está en el rango de la CB190R y la GSX-S150, pero ofrece menos potencia que ambas. Donde gana
  es en la trayectoria y confianza: la FZ es una moto conocida, con repuestos en todos lados, cualquier taller la
  entiende, y su reventa es sólida. Para el que quiere una naked equilibrada, que no sorprende pero tampoco decepciona,
  la FZ 3.0 es una compra inteligente. No es la más emocionante, pero es de las más sensatas.
