descripcion: >-
  La NS160 FI ABS es la naked deportiva de Bajaj en el segmento de
  160cc, con un nivel de equipamiento que incluye suspensión invertida y
  ABS de doble canal con tres modos, características que normalmente se
  ven en motos de mayor cilindraje. Es la hermana "deportiva" dentro de
  la familia de 160cc de la marca.

  En carretera con curvas es donde se nota la diferencia frente a
  rivales más básicas: la horquilla USD da mayor precisión en el manejo
  y el ABS con distintos modos permite adaptar el frenado según el
  terreno. El motor entrega casi 17 caballos, suficiente para moverse
  con soltura tanto en ciudad como en carretera.

  Compite con la Suzuki Gixxer 150 ABS y la TVS Apache RTR 160. Es la
  moto ideal para el motociclista que quiere una naked de 160cc con
  equipamiento de gama alta (USD y ABS multimodo), sin necesitar el
  cilindraje ni el precio de una 200cc.
