descripcion: >-
  El Karguero 3W 200 es el motocarro de carga de AKT, diseñado para el transporte de mercancía en zonas urbanas y
  rurales de Colombia. Con un motor de 197 cc OHV que entrega 12.07 HP y 13.9 Nm de torque, está optimizado para carga
  más que para velocidad. Su volco con laterales abatibles permite cargar hasta 410 kg de forma práctica, y la
  suspensión delantera telescópica reforzada de 49.95 mm combinada con ballestas traseras de 5 hojas ofrece estabilidad
  incluso a plena carga. Los frenos son de disco hidráulico adelante y tambor hidráulico atrás. El tanque de 13.4 litros
  le da una autonomía adecuada para jornadas de trabajo urbano. Compite directamente con el Tuk Tuk 200 de la misma AKT
  y con motocarros de otras marcas. Es el vehículo ideal para el emprendedor que necesita un transporte de carga
  económico, confiable y con respaldo de red de servicio a nivel nacional.
