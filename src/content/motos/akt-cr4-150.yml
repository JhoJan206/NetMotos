pros:
  - Más potencia que la CR4 125 sin subir mucho de precio
  - Frenos de disco en ambas ruedas con sistema CBS
  - Buen equilibrio entre precio y desempeño dentro del catálogo AKT
contras:
  - Motor a carburador, sin la eficiencia de una inyección electrónica
  - Sigue siendo un cilindraje limitado para carretera a velocidad alta
  - Diferencias frente a la CR4 125 son notorias más en potencia que en equipamiento
rating: 4.4
descripcion: >-
  La CR4 150 toma el mismo diseño exitoso de la CR4 125 y le suma cilindraje, dándole un poco más de fuerza para quien
  encuentra la versión de 125cc algo justa. Es la opción intermedia dentro de la familia CR4 para quien quiere más
  potencia sin llegar todavía a la versión 200 Pro.

  El aumento de cilindraje se nota principalmente al retomar velocidad después de un semáforo o al subir con parrillero,
  situaciones donde la 125 se queda un poco corta. El resto de la experiencia es muy similar: frenos CBS en ambas ruedas
  y un diseño que sigue destacando frente a otras naked económicas.

  Compite con la Bajaj Pulsar NS125 y la Hero Hunk 125R. Es la moto ideal para el motociclista que ya conoce el segmento
  de 125cc y quiere un poco más de potencia sin subir demasiado de precio ni de cilindraje.
