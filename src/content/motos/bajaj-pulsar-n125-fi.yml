descripcion: >-
  La Pulsar N125 FI es la apuesta más reciente de Bajaj para el segmento
  urbano de 125cc en Colombia, con un diseño inspirado en las supermotos
  austríacas de la casa y una lista de equipamiento que sorprende para su
  categoría: inyección electrónica, sistema Start-Stop y tablero digital
  con conectividad Bluetooth.

  Su peso liviano de apenas 125 kg y la distancia entre ejes reducida la
  hacen muy ágil para moverse en tráfico pesado, girar en espacios
  cerrados y estacionar sin complicaciones. La distancia al piso de 198
  mm también ayuda a sortear huecos y resaltos sin sustos, algo poco
  frecuente en una naked de este cilindraje.

  Compite con la TVS Raider 125 FI y la Hero Hunk 125R, ofreciendo un
  equilibrio entre tecnología y precio que la posiciona en un punto medio
  del segmento. Es la moto ideal para el motociclista urbano joven que
  busca tecnología moderna en una 125cc, sin necesitar ABS ni frenos de
  disco en ambas ruedas.
