rating: 4.3
descripcion: >-
  La Xpulse 200 le apunta directamente al motociclista que quiere una
  doble propósito con vocación real de trocha, sin pagar el precio de una
  Honda XRE 300. Con buena distancia al piso y suspensión de recorrido
  largo, se defiende bien en caminos destapados y terrenos irregulares.

  En ciudad cumple sin problema, aunque su fuerte está en las vías
  destapadas donde la suspensión absorbe bien los baches y piedras. En
  carretera pavimentada a velocidad de crucero el motor se siente algo
  exigido, así que no es la mejor opción para viajes largos de autopista
  a alta velocidad constante.

  Compite de frente con la Bajaj Pulsar NS200 en versión doble propósito y,
  en un segmento superior de precio, con la propia XRE 300. Es la moto
  ideal para quien busca su primera doble propósito seria para explorar
  caminos rurales y fincas los fines de semana, sin gastar el presupuesto
  de las marcas japonesas.
