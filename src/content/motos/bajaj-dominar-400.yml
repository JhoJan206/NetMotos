rating: 4.5
descripcion: >-
  La Dominar 400 lleva años siendo la reina no oficial de las motos touring de media cilindrada en Colombia, y la razón
  es simple: da 373cc reales, ABS y suspensión invertida por un precio que ninguna otra marca logra igualar. Es la moto
  de quien quiere viajar lejos sin gastar como si comprara una KTM o una Kawasaki.

  En carretera es donde brilla de verdad. El motor entrega torque desde rpm bajas, así que sostiene velocidad de crucero
  sin exigirse, y el parabrisas (en la versión Volcano) reduce bastante el cansancio en trayectos largos. En ciudad se
  siente pesada comparada con una naked de 200cc, pero nada que un piloto con algo de experiencia no maneje bien.

  Compite de frente con la Honda XRE 300 y la Suzuki V-Strom 250, aunque su perfil es más de ruta asfaltada que de
  trocha. Para el motociclista que quiere su primera moto grande para viajar los fines de semana, sin gastar 30
  millones, la Dominar 400 sigue siendo de las opciones más sensatas del mercado.
