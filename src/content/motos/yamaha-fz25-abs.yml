  - Suspensión trasera de recorrido corto para vías destapadas
rating: 4.4
descripcion: >-
  La FZ25 es la naked monocilíndrica de 250cc con la que Yamaha lleva años defendiendo terreno en Colombia frente a la
  ofensiva de marcas indias como TVS y Bajaj. Su motor Blue Core prioriza la eficiencia sobre la potencia bruta, lo que
  se traduce en un consumo bastante competitivo para el segmento.

  En ciudad se mueve con soltura gracias a su peso liviano de 148 kg, y el doble disco con ABS de serie da tranquilidad
  en frenadas de emergencia, algo que todavía no todas las rivales del segmento ofrecen. En carretera cumple sin
  sobresaltos, aunque el motor monocilíndrico se siente algo justo frente a las naked bicilíndricas como la Yamaha
  MT-03.

  Compite de frente con la Suzuki Gixxer 250 y la TVS Apache RTR 200 4V. Es la moto ideal para el motociclista que
  quiere una naked de 250cc confiable, con buen respaldo de marca y consumo eficiente, sin necesitar todavía la potencia
  (ni el precio) de una bicilíndrica.
