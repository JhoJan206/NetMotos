pros:
  - Doble disco con ABS de serie en un segmento donde no siempre es lo común
  - Motor Blue Core eficiente, con buen equilibrio entre potencia y consumo
  - Tablero digital completo y buen respaldo de la red Yamaha
contras:
  - Potencia modesta frente a naked bicilíndricas de cilindraje similar
