descripcion: >-
  La TT200 con ABS es la apuesta de AKT en el segmento de doble propósito, un terreno donde marcas como Honda y Yamaha
  llevan años dominando en Colombia. Con ABS delantero de serie y buena distancia al piso, busca convencer al comprador
  que quiere una enduro liviana sin pagar el precio de las marcas japonesas.

  En trocha se comporta de forma correcta gracias a su suspensión de largo recorrido, aunque no tiene la sofisticación
  de una Honda XR150L o una Hero Xpulse 200. En carretera cumple bien para trayectos medios, con un motor que comparte
  base con la CR4 200 Pro.

  Compite directamente con la Honda XR150L y la Hero Xpulse 200, siendo la opción más económica de las tres. Es la moto
  ideal para el comprador que quiere una doble propósito de 200cc con ABS, priorizando el precio por encima del
  prestigio de marca o la sofisticación mecánica.
