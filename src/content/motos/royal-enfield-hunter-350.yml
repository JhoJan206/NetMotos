pros:
  - Precio de entrada a la marca Royal Enfield, el más accesible del portafolio
  - Chasis más ágil y liviano que el resto de modelos de la marca
  - Sonido de escape distintivo, muy valorado por los fanáticos de la marca
contras:
  - Suspensión trasera de recorrido corto, se nota en vías destapadas
  - Potencia justa para dos pasajeros con equipaje en pendientes
  - Freno trasero algo esponjoso comparado con la competencia japonesa
rating: 4.5
descripcion: >-
  La Hunter 350, conocida también como HNTR 350, es la moto con la que Royal Enfield decidió pelear directamente en el
  segmento urbano de 350cc, dejando de lado por un momento el aire retro-touring de sus otros modelos. Es más ágil, más
  liviana y más asequible que el resto de la gama de la marca.

  En ciudad se mueve con una soltura que sorprende viniendo de una marca conocida por motos más pesadas: el chasis
  responde rápido en tráfico y el motor de 350cc sobra para moverse con autoridad entre carros. Las llantas de rin 17
  adelante y atrás también le dan un comportamiento más cercano al de una naked moderna que al de una clásica
  tradicional.

  Compite con su hermana Meteor 350 (más orientada a crucero) y, en espíritu retro, con la Yamaha FZ y la TVS Apache RTR
  160. Es la moto ideal para quien quiere entrar al mundo Royal Enfield sin pagar el precio de una Classic 350,
  priorizando agilidad urbana sin perder el carácter de la marca.
