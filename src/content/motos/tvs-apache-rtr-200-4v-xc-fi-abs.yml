descripcion: >-
  La TVS Apache RTR 200 4V XC FI ABS es de esas motos que mirás la ficha técnica y decís "esto tiene todo". Tres modos
  de manejo seleccionables (Sport, Urbano, Lluvia), inyección electrónica, ABS de doble canal, refrigeración por aceite
  y una suspensión Kayaba ajustable en 7 posiciones. El motor de 197.75 cc genera 20.23 HP y 18.1 Nm, números que la
  colocan justo entre las 200 cc de acceso y las naked de mayor cilindraje. Pesa 152 kilos y el asiento a 800 mm queda
  bien para la mayoría. El precio de 12.799.999 COP compite directamente con la Pulsar NS200 y le gana en equipamiento
  —ninguna de esas tiene modos de manejo. La refrigeración por aceite baja hasta 10°C la temperatura en tráfico, una
  ventaja real en ciudades calurosas como Cali o Barranquilla. El punto flaco: la conectividad SmartXonnect depende de
  una app que no todos se molestan en instalar. Y la suspensión trasera viene con ajuste de fábrica más firme de lo
  ideal para carretera. Pero en relación precio-equipamiento, es dificil de superar. Eso sí, verifica que haya servicio
  TVS en tu zona.
