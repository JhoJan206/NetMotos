rating: 4.7
descripcion: >-
  La Ninja 400 es probablemente la deportiva bicilíndrica más deseada del mercado colombiano en este rango de
  cilindraje. Con casi 48 caballos y un chasis liviano, ofrece una experiencia de aceleración y sonido de escape que
  ninguna monocilíndrica de la competencia logra replicar.

  En carretera con curvas revela por qué tiene tanta fama: el motor bicilíndrico entrega potencia de forma progresiva y
  suave, sin los tirones típicos de un solo cilindro, mientras el chasis liviano permite cambios de dirección rápidos.
  En ciudad se comporta bien también, aunque la posición deportiva cansa en trayectos largos con tráfico.

  Su rival más directo es la KTM RC 390, con la diferencia de que la Ninja ofrece un motor más refinado a cambio de un
  precio superior. Es la moto ideal para el motociclista que quiere el prestigio y la experiencia de manejo de una
  deportiva bicilíndrica real, y que está dispuesto a pagar el premium que eso implica frente a las opciones
  monocilíndricas.
